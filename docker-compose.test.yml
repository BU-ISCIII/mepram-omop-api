services:
  mepram_db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MEPRAM_DB_NAME:-mepram_dashboard}
      POSTGRES_USER: ${MEPRAM_DB_USER:-mepram}
      POSTGRES_PASSWORD: ${MEPRAM_DB_PASSWORD:-mepram_password}
    ports:
      - "${MEPRAM_DB_PORT_HOST:-6543}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - mepram_db_data:/var/lib/postgresql/data
      - ${MEPRAM_DASHBOARD_SQL_PATH:-../../dashboard.sql}:/docker-entrypoint-initdb.d/001-dashboard.sql:ro

  mepram_api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      mepram_db:
        condition: service_healthy
    environment:
      MEPRAM_API_DEBUG: ${MEPRAM_API_DEBUG:-true}
      MEPRAM_API_ALLOWED_HOSTS: ${MEPRAM_API_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      MEPRAM_DB_HOST: mepram_db
      MEPRAM_DB_PORT: 5432
      MEPRAM_DB_NAME: ${MEPRAM_DB_NAME:-mepram_dashboard}
      MEPRAM_DB_USER: ${MEPRAM_DB_USER:-mepram}
      MEPRAM_DB_PASSWORD: ${MEPRAM_DB_PASSWORD:-mepram_password}
      MEPRAM_DASHBOARD_SCHEMA: ${MEPRAM_DASHBOARD_SCHEMA:-dashboard}
      MEPRAM_CORS_ALLOWED_ORIGINS: ${MEPRAM_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000}
    ports:
      - "${MEPRAM_API_PORT:-8100}:8000"
    volumes:
      - .:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport urllib.request\nurllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=5).read()\nPY",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  mepram_db_data:
